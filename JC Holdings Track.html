<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060708">
<title>JC Holdings Track</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=SF+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080b;
  --panel:#101317;
  --panel2:#141820;
  --panel3:#191e26;
  --line:rgba(255,255,255,.08);
  --line-strong:rgba(255,255,255,.14);
  --text:#f4f6fb;
  --muted:#9aa3b3;
  --faint:#667083;
  --green:#34c759;
  --red:#ff453a;
  --blue:#0a84ff;
  --blue-soft:rgba(10,132,255,.18);
  --chip:rgba(255,255,255,.06);
  --shadow:0 24px 60px rgba(0,0,0,.45);
  --radius:24px;
  --radius-sm:16px;
  --radius-xs:12px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:radial-gradient(circle at top,#151a22 0,#0a0d12 35%,#060708 100%);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100vh;min-height:100dvh}
button,input,select{font:inherit}
button{cursor:pointer}
a{color:inherit}
::selection{background:rgba(10,132,255,.24)}
.app{max-width:1280px;margin:0 auto;padding:34px 22px 60px}
.topbar{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;margin-bottom:26px}
.title-wrap{display:flex;flex-direction:column;gap:8px}
.kicker{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--blue)}
.title{font-size:clamp(34px,4vw,56px);line-height:1;font-weight:700;letter-spacing:-.04em}
.subtitle{font-size:15px;color:var(--muted)}
.actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.badge{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border:1px solid var(--line);background:rgba(255,255,255,.03);border-radius:999px;color:var(--muted);font-size:13px}
.dot{width:8px;height:8px;border-radius:50%;background:#5f6675;box-shadow:0 0 0 4px rgba(255,255,255,.03)}
.dot.reading,.dot.writing,.dot.verifying{background:#ffd60a;animation:pulse 1.2s infinite}
.dot.ok{background:var(--green)}
.dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.btn{border:none;border-radius:999px;padding:12px 18px;background:rgba(255,255,255,.07);color:var(--text);font-weight:600;transition:.2s transform,.2s background,.2s opacity}
.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.11)}
.btn.primary{background:linear-gradient(180deg,#2296ff,#0a84ff);box-shadow:0 16px 34px rgba(10,132,255,.24)}
.btn.ghost{background:rgba(255,255,255,.04);border:1px solid var(--line)}
.btn.danger{background:rgba(255,69,58,.15);color:#ffd1cc}
.btn:disabled{opacity:.45;cursor:default;transform:none}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.035));backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}
.kpi{padding:20px 22px}
.kpi-label{font-size:13px;color:var(--muted);margin-bottom:8px}
.kpi-value{font-size:32px;font-weight:700;letter-spacing:-.04em}
.kpi-sub{margin-top:8px;font-size:13px;color:var(--faint)}
.layout{display:grid;grid-template-columns:340px 1fr;gap:18px}
.side{padding:22px}
.side-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.side-title{font-size:18px;font-weight:700}
.side-sub{font-size:13px;color:var(--muted)}
.ring-wrap{display:flex;justify-content:center;align-items:center;padding:8px 0 22px}
.legend{display:flex;flex-direction:column;gap:10px}
.legend-row{display:flex;justify-content:space-between;gap:12px;align-items:center}
.legend-left{display:flex;align-items:center;gap:10px;min-width:0}
.legend-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.legend-name{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.legend-pct{font-size:13px;color:var(--muted)}
.main{padding:18px}
.toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.search{flex:1 1 320px;position:relative}
.search input{width:100%;border:none;border-radius:18px;background:rgba(255,255,255,.06);padding:14px 44px 14px 16px;color:var(--text);outline:none;border:1px solid transparent;transition:.2s border-color,.2s background}
.search input:focus{background:rgba(255,255,255,.075);border-color:rgba(255,255,255,.1)}
.search .clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:transparent;color:var(--muted);font-size:18px;padding:6px 8px;border-radius:10px}
.toolbar-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.segmented,.sorts{display:flex;gap:8px;flex-wrap:wrap}
.pill{border:none;border-radius:999px;padding:10px 14px;background:rgba(255,255,255,.05);color:var(--muted);font-size:13px;font-weight:600}
.pill.on{background:var(--blue-soft);color:#bdddff;box-shadow:inset 0 0 0 1px rgba(10,132,255,.35)}
.table{border:1px solid var(--line);border-radius:22px;overflow:hidden;background:rgba(255,255,255,.025)}
.thead,.row{display:grid;grid-template-columns:104px 1.3fr 86px 110px 128px 100px 190px;align-items:center}
.thead{padding:14px 18px;background:rgba(255,255,255,.035);border-bottom:1px solid var(--line)}
.thead div{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.02em}
.row{padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.05)}
.row:last-child{border-bottom:none}
.sym{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-weight:600;font-size:15px}
.name{display:flex;flex-direction:column;gap:6px;min-width:0}
.name-main{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta-chip{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(255,255,255,.05);border-radius:999px;font-size:12px;color:var(--muted);width:max-content;max-width:100%}
.val{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:14px;text-align:right}
.weight{display:flex;flex-direction:column;gap:8px}
.weight-line{height:7px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden}
.weight-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#61b2ff,#0a84ff)}
.weight-label{font-size:12px;color:var(--muted);text-align:right}
.row-actions{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.icon-btn{border:none;border-radius:999px;padding:9px 12px;background:rgba(255,255,255,.06);color:var(--text);font-size:12px;font-weight:600}
.icon-btn.sell{background:rgba(255,69,58,.12);color:#ffc3be}
.icon-btn.exec{background:rgba(52,199,89,.13);color:#d5ffe0}
.empty{padding:50px 20px;text-align:center;color:var(--muted);font-size:15px}
.cards{display:none}
.mobile-card{padding:16px;border-bottom:1px solid rgba(255,255,255,.05)}
.mobile-card:last-child{border-bottom:none}
.mobile-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
.mobile-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.mobile-stat{background:rgba(255,255,255,.04);border-radius:16px;padding:12px}
.mobile-stat-label{font-size:11px;color:var(--muted);margin-bottom:6px}
.mobile-stat-value{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:13px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(18px);display:none;align-items:flex-end;justify-content:flex-end;padding:0;z-index:50}
.overlay.open{display:flex}
.sheet{width:min(460px,100vw);height:100vh;height:100dvh;background:linear-gradient(180deg,#11151b,#0c0f14);border-left:1px solid var(--line-strong);box-shadow:var(--shadow);display:flex;flex-direction:column}
.sheet-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;padding:24px 22px 18px;border-bottom:1px solid var(--line)}
.sheet-title{font-size:28px;font-weight:700;letter-spacing:-.04em}
.sheet-sub{font-size:13px;color:var(--muted);margin-top:6px}
.sheet-close{border:none;background:rgba(255,255,255,.06);color:var(--text);width:38px;height:38px;border-radius:999px;font-size:18px}
.sheet-body{padding:20px 22px 24px;overflow:auto;display:flex;flex-direction:column;gap:16px}
.field{display:flex;flex-direction:column;gap:8px}
.field label{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.02em}
.field input,.field select,.field textarea{width:100%;border:none;background:rgba(255,255,255,.06);border-radius:16px;padding:14px 15px;color:var(--text);outline:none;border:1px solid transparent}
.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(255,255,255,.1)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hint{font-size:12px;color:var(--faint)}
.summary{display:flex;flex-direction:column;gap:10px;background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:18px;padding:14px 16px}
.summary-row{display:flex;justify-content:space-between;gap:12px;font-size:14px}
.summary-row strong{font-size:15px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:none;border-radius:999px;padding:10px 12px;background:rgba(255,255,255,.06);color:var(--muted);font-size:12px;font-weight:600}
.chip.on{background:var(--blue-soft);color:#bdddff}
.footer-note{font-size:12px;color:var(--faint);line-height:1.5}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);padding:12px 16px;background:rgba(18,20,26,.94);color:var(--text);border:1px solid var(--line-strong);border-radius:999px;backdrop-filter:blur(18px);box-shadow:var(--shadow);display:none;z-index:60;font-size:13px}
.toast.show{display:block}
@media (max-width:1100px){
  .layout{grid-template-columns:1fr}
  .side{order:2}
}
@media (max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .thead,.row{display:none}
  .cards{display:block}
  .sheet{width:100%;height:min(92vh,92dvh);border-left:none;border-top:1px solid var(--line-strong);border-radius:28px 28px 0 0}
  .overlay{align-items:flex-end}
}
@media (max-width:620px){
  .app{padding:22px 14px 44px}
  .grid{grid-template-columns:1fr 1fr}
  .kpi{padding:16px}
  .kpi-value{font-size:25px}
  .topbar{align-items:flex-start}
  .actions{justify-content:flex-start}
  .toolbar-right{width:100%}
  .row2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="overlay" id="overlay"></div>
<div class="toast" id="toast"></div>
<script>
(() => {
  const DEFAULT_GS_URL = 'https://script.google.com/macros/s/AKfycbzxoWOjwTd_k_ThgrA50WT-NTYncyQv6TbAr-XRDMxI0L4YRLhRRjF3kEDLfJW52Kk/exec';
  const LS_STATE = 'jc-holdings-live-cache-v1';
  const LS_URL = 'jc-holdings-gs-url-v1';
  const COLORS = ['#0A84FF','#34C759','#BF5AF2','#64D2FF','#FF9F0A','#FF375F','#5E5CE6','#30D158','#FFD60A','#AC8E68','#FF453A','#7D7AFF'];

  const SAMPLE_ROWS = [
    ['Current Holding','MSFT','Microsoft Corp',2,786.66,393.33,'Active'],
    ['Current Holding','META','Meta Platforms Inc',1,593,593,'Active'],
    ['Current Holding','GOOGL','Alphabet Inc Class A',1,282,282,'Active'],
    ['Current Holding','HOOD','Robinhood Markets Inc',3,222.87,74.29,'Active'],
    ['Current Holding','DUOL','Duolingo Inc',1,95,95,'Active'],
    ['Current Holding','CALM','Cal-Maine Foods Inc',1,92.02,92.02,'Active'],
    ['Current Holding','DUOL','Duolingo Inc',3,293.33,97.78,'Active'],
    ['Current Holding','NFLX','Netflix Inc',4,325.43,81.36,'Active'],
    ['Current Holding','NVDA','NVIDIA Corp',2,361.42,180.71,'Active'],
    ['GTC Area','ETHA','iShares Ethereum Trust ETF',5,67.5,13.5,'180-day tentative area'],
    ['GTC Area','IBIT','iShares Bitcoin Trust ETF',10,350,35,'180-day tentative area'],
    ['GTC Area','MSFT','Microsoft Corp',1,251,251,'180-day tentative area'],
    ['GTC Area','ABBV','AbbVie Inc',1,198,198,'180-day tentative area'],
    ['GTC Area','PLTR','Palantir Technologies Inc Class A',1,132,132,'180-day tentative area'],
    ['GTC Area','SCHD','Schwab US Dividend Equity ETF',5,146,29.2,'180-day tentative area'],
    ['GTC Area','AMZN','Amazon.com Inc',2,396,198,'180-day tentative area']
  ];

  const S = {
    h: [],
    g: [],
    s: [],
    tab: 'holdings',
    q: '',
    sk: 'totalCost',
    sd: 'desc',
    gsUrl: localStorage.getItem(LS_URL) || DEFAULT_GS_URL,
    syncState: 'idle',
    syncLabel: 'Ready',
    panel: null,
    panelData: null,
    form: {},
    busy: false,
    lastLoadedAt: null
  };

  const $ = (sel, root = document) => root.querySelector(sel);
  const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
  const money = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(Number(n || 0));
  const pct = n => `${(Number(n || 0)).toFixed(1)}%`;
  const isoDate = d => {
    const dt = d ? new Date(d) : new Date();
    const year = dt.getFullYear();
    const month = String(dt.getMonth() + 1).padStart(2,'0');
    const day = String(dt.getDate()).padStart(2,'0');
    return `${year}-${month}-${day}`;
  };
  const prettyDate = () => new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const uid = () => Math.random().toString(36).slice(2,10);
  const round2 = n => Math.round((Number(n || 0) + Number.EPSILON) * 100) / 100;

  function setSync(state, label){
    S.syncState = state;
    S.syncLabel = label;
    const badge = $('#sync-badge');
    if (!badge) return;
    const dot = badge.querySelector('.dot');
    const text = badge.querySelector('.badge-text');
    dot.className = `dot ${state === 'idle' ? '' : state}`;
    if (state === 'idle') dot.className = 'dot';
    text.textContent = label;
  }

  function toast(msg){
    const el = $('#toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => el.classList.remove('show'), 2400);
  }

  function statusClass(v){
    return v >= 0 ? 'var(--green)' : 'var(--red)';
  }

  function bucketOfLabel(label){
    const t = String(label || '').toLowerCase();
    if (t.includes('gtc')) return 'gtc';
    if (t.includes('sold')) return 'sold';
    return 'holding';
  }

  function parseSoldStatus(status){
    const str = String(status || '');
    const priceMatch = str.match(/sold\s*@\s*\$?([0-9]+(?:\.[0-9]+)?)/i);
    const dateMatch = str.match(/on\s+(\d{4}-\d{2}-\d{2})/i);
    return {
      soldPrice: priceMatch ? Number(priceMatch[1]) : 0,
      soldDate: dateMatch ? dateMatch[1] : ''
    };
  }

  function fromSheetRow(row, rowNumber){
    const bucketLabel = row[0] || '';
    const bucket = bucketOfLabel(bucketLabel);
    const base = {
      rowNumber: rowNumber || null,
      bucket,
      bucketLabel,
      symbol: String(row[1] || '').trim().toUpperCase(),
      name: String(row[2] || '').trim(),
      shares: Number(row[3] || 0),
      totalCost: round2(row[4] || 0),
      avgCost: round2(row[5] || 0),
      status: String(row[6] || '').trim()
    };
    if (bucket === 'sold') {
      const extra = parseSoldStatus(base.status);
      base.soldPrice = round2(extra.soldPrice || 0);
      base.soldDate = extra.soldDate || '';
    }
    return base;
  }

  function fromBackend(data){
    const holdings = (data.holdings || []).map(x => ({
      rowNumber: x.rowNumber ?? null,
      bucket: 'holding',
      bucketLabel: x.bucketLabel || 'Current Holding',
      symbol: String(x.symbol || '').trim().toUpperCase(),
      name: String(x.name || '').trim(),
      shares: Number(x.shares || 0),
      totalCost: round2(x.totalCost || 0),
      avgCost: round2(x.avgCost || 0),
      status: String(x.status || 'Active')
    }));
    const gtc = (data.gtc || []).map(x => ({
      rowNumber: x.rowNumber ?? null,
      bucket: 'gtc',
      bucketLabel: x.bucketLabel || 'GTC Area',
      symbol: String(x.symbol || '').trim().toUpperCase(),
      name: String(x.name || '').trim(),
      shares: Number(x.shares || 0),
      totalCost: round2(x.totalCost || 0),
      avgCost: round2(x.avgCost || 0),
      status: String(x.status || '180-day tentative area')
    }));
    const sold = (data.sold || []).map(x => ({
      rowNumber: x.rowNumber ?? null,
      bucket: 'sold',
      bucketLabel: x.bucketLabel || 'Sold',
      symbol: String(x.symbol || '').trim().toUpperCase(),
      name: String(x.name || '').trim(),
      shares: Number(x.shares || 0),
      totalCost: round2(x.totalCost || 0),
      avgCost: round2(x.avgCost || 0),
      status: String(x.status || ''),
      soldPrice: round2(x.soldPrice || parseSoldStatus(x.status || '').soldPrice || 0),
      soldDate: String(x.soldDate || parseSoldStatus(x.status || '').soldDate || '')
    }));
    return {h: holdings, g: gtc, s: sold};
  }

  function loadSample(){
    const items = SAMPLE_ROWS.map((row, idx) => fromSheetRow(row, idx + 2));
    S.h = items.filter(x => x.bucket === 'holding');
    S.g = items.filter(x => x.bucket === 'gtc');
    S.s = items.filter(x => x.bucket === 'sold');
    persistLocal();
  }

  function persistLocal(){
    const payload = {
      h: S.h,
      g: S.g,
      s: S.s,
      lastLoadedAt: S.lastLoadedAt
    };
    localStorage.setItem(LS_STATE, JSON.stringify(payload));
    localStorage.setItem(LS_URL, S.gsUrl || '');
  }

  function restoreLocal(){
    try{
      const raw = JSON.parse(localStorage.getItem(LS_STATE) || 'null');
      if (raw){
        S.h = raw.h || [];
        S.g = raw.g || [];
        S.s = raw.s || [];
        S.lastLoadedAt = raw.lastLoadedAt || null;
        return true;
      }
    }catch(_){}
    return false;
  }

  function stats(){
    const invested = S.h.reduce((a,x) => a + Number(x.totalCost || 0), 0);
    const gtc = S.g.reduce((a,x) => a + Number(x.totalCost || 0), 0);
    const costBasisSold = S.s.reduce((a,x) => a + Number(x.totalCost || 0), 0);
    const proceeds = S.s.reduce((a,x) => a + Number(x.shares || 0) * Number(x.soldPrice || 0), 0);
    return {
      invested: round2(invested),
      gtc: round2(gtc),
      proceeds: round2(proceeds),
      realized: round2(proceeds - costBasisSold),
      totalCapital: round2(invested + gtc)
    };
  }

  function allSymbols(){
    const map = new Map();
    [...S.h, ...S.g].forEach(item => {
      if (!map.has(item.symbol)) map.set(item.symbol, item.name);
    });
    return Array.from(map.entries()).map(([symbol,name]) => ({symbol,name}));
  }

  function currentList(){
    const base = S.tab === 'holdings' ? S.h : S.tab === 'gtc' ? S.g : S.s;
    const q = S.q.trim().toLowerCase();
    let list = q ? base.filter(x =>
      String(x.symbol).toLowerCase().includes(q) ||
      String(x.name).toLowerCase().includes(q) ||
      String(x.status || '').toLowerCase().includes(q)
    ) : [...base];
    const dir = S.sd === 'desc' ? -1 : 1;
    list.sort((a,b) => {
      if (S.sk === 'symbol') return dir * a.symbol.localeCompare(b.symbol);
      return dir * ((Number(a[S.sk] || 0)) - (Number(b[S.sk] || 0)));
    });
    return list;
  }

  function listTotal(){
    const list = S.tab === 'holdings' ? S.h : S.tab === 'gtc' ? S.g : S.s;
    return list.reduce((a,x) => a + Number(x.totalCost || 0), 0);
  }

  function setData(data){
    S.h = data.h || [];
    S.g = data.g || [];
    S.s = data.s || [];
    S.lastLoadedAt = new Date().toISOString();
    persistLocal();
  }

  function normalizeBucketLabel(bucket){
    if (bucket === 'gtc') return 'GTC Area';
    if (bucket === 'sold') return 'Sold';
    return 'Current Holding';
  }

  function statusForBucket(bucket, windowText){
    if (bucket === 'gtc') return windowText || '180-day tentative area';
    if (bucket === 'sold') return windowText || '';
    return 'Active';
  }

  function ringSVG(items, total){
    if (!total) {
      return `<svg width="188" height="188" viewBox="0 0 188 188" aria-hidden="true">
        <circle cx="94" cy="94" r="72" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="18"></circle>
        <text x="94" y="90" text-anchor="middle" fill="var(--text)" style="font:700 28px Inter, sans-serif">$0</text>
        <text x="94" y="114" text-anchor="middle" fill="var(--muted)" style="font:500 12px Inter, sans-serif">No holdings</text>
      </svg>`;
    }
    const cx = 94, cy = 94, r = 72, w = 18;
    let start = -Math.PI / 2;
    const paths = items.map((item, i) => {
      const slice = (item.value / total) * Math.PI * 2;
      const end = start + slice;
      const large = slice > Math.PI ? 1 : 0;
      const x1 = cx + r * Math.cos(start);
      const y1 = cy + r * Math.sin(start);
      const x2 = cx + r * Math.cos(end);
      const y2 = cy + r * Math.sin(end);
      const d = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
      const out = `<path d="${d}" fill="none" stroke="${COLORS[i % COLORS.length]}" stroke-width="${w}" stroke-linecap="round"></path>`;
      start = end;
      return out;
    }).join('');
    return `<svg width="188" height="188" viewBox="0 0 188 188" aria-hidden="true">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="${w}"></circle>
      ${paths}
      <text x="94" y="88" text-anchor="middle" fill="var(--text)" style="font:700 24px Inter, sans-serif">${money(total).replace('.00','')}</text>
      <text x="94" y="112" text-anchor="middle" fill="var(--muted)" style="font:500 12px Inter, sans-serif">Current holdings</text>
    </svg>`;
  }

  function escapeHtml(str){
    return String(str || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  /* ─── JSONP transport (used for BOTH reads and writes) ─────────── */
  function jsonp(url){
    return new Promise((resolve, reject) => {
      const cb = '__jc_cb_' + uid();
      const script = document.createElement('script');
      const sep = url.includes('?') ? '&' : '?';
      const finalUrl = `${url}${sep}callback=${cb}&_=${Date.now()}`;
      let done = false;
      const cleanup = () => {
        if (script.parentNode) script.parentNode.removeChild(script);
        try { delete window[cb]; } catch(_) { window[cb] = undefined; }
      };
      window[cb] = (data) => {
        done = true;
        cleanup();
        resolve(data);
      };
      script.src = finalUrl;
      script.onerror = () => {
        if (done) return;
        cleanup();
        reject(new Error('JSONP request failed'));
      };
      document.body.appendChild(script);
      setTimeout(() => {
        if (done) return;
        cleanup();
        reject(new Error('JSONP request timed out'));
      }, 15000);
    });
  }

  /* ─── write via JSONP (GET with action + payload in URL) ───────── */
  function jsonpWrite(action, payload){
    if (!S.gsUrl) return Promise.reject(new Error('No Apps Script URL configured'));
    const encoded = encodeURIComponent(JSON.stringify(payload));
    return jsonp(`${S.gsUrl}?action=${action}&payload=${encoded}`);
  }

  async function refreshFromSheet(showToast){
    if (!S.gsUrl) {
      if (showToast) toast('Set your Apps Script URL first');
      return false;

    try{

      const data = await jsonp(`${S.gsUrl}?action=readAll`);
      const normalized = fromBackend(data);
      setData(normalized);
      renderAll();
      setSync('ok','Synced');
      if (showToast) toast('Read successful');
      return true;
    }catch(err){
      setSync('error','Read failed');
      if (showToast) toast('Read failed — ' + err.message);
      return false;
    }
  }

  /* ─── unified write → verify → update ──────────────────────────── */
  async function submitWithVerification(action, payload, successText){
    if (S.busy) return false;
    S.busy = true;
    try{
      // 1. Write via JSONP
      setSync('writing','Writing');
      const result = await jsonpWrite(action, payload);
      if (result && result.ok === false){
        throw new Error(result.error || 'Backend rejected the write');
      }

      // 2. Read back to get fresh state with correct rowNumbers
      setSync('verifying','Verifying');
      await wait(500);
      try{
        const data = await jsonp(`${S.gsUrl}?action=readAll`);
        const normalized = fromBackend(data);
        setData(normalized);
      }catch(_){
        // Read-back failed, but write succeeded. Force a refresh later.
      }

      renderAll();
      closePanel();
      setSync('ok','Verified');
      toast(successText);
      return true;
    }catch(err){
      setSync('error','Write failed');
      toast('Write failed — ' + err.message);
      return false;
    }finally{
      S.busy = false;
    }
  }

  function wait(ms){ return new Promise(r => setTimeout(r, ms)); }

  async function submitAdd(){
    const symbol = String(S.form.symbol || '').trim().toUpperCase();
    const name = String(S.form.name || '').trim() || symbol;
    const shares = Number(S.form.shares || 0);
    const cost = Number(S.form.cost || 0);
    const bucket = S.form.bucket || 'holding';
    const status = statusForBucket(bucket, String(S.form.windowText || '').trim());
    if (!symbol || shares <= 0 || cost <= 0) return toast('Fill symbol, shares, and total cost');

    await submitWithVerification('add', {
      bucket,
      symbol,
      name,
      shares: round2(shares),
      totalCost: round2(cost),
      avgCost: round2(cost / shares),
      status
    }, `${symbol} added`);
  }

  async function submitSell(){
    const item = S.panelData;
    const shares = Number(S.form.shares || 0);
    const soldPrice = Number(S.form.price || 0);
    const soldDate = S.form.soldDate || isoDate();
    if (!item || shares <= 0 || soldPrice <= 0 || shares > item.shares) return toast('Check shares and sold price');

    await submitWithVerification('sell', {
      rowNumber: item.rowNumber,
      sharesSold: round2(shares),
      soldPrice: round2(soldPrice),
      soldDate
    }, `${item.symbol} sold`);
  }

  async function submitExec(){
    const item = S.panelData;
    const fillPrice = Number(S.form.fillPrice || 0);
    const fillDate = S.form.fillDate || isoDate();
    if (!item || fillPrice <= 0) return toast('Enter a fill price');

    await submitWithVerification('execute', {
      rowNumber: item.rowNumber,
      fillPrice: round2(fillPrice),
      fillDate
    }, `${item.symbol} executed`);
  }

  async function confirmRemove(item){
    const label = `${item.symbol} (${item.bucket === 'gtc' ? 'GTC' : item.bucket === 'sold' ? 'Sold' : 'Holding'})`;
    const ok = window.confirm(`Delete ${label}?`);
    if (!ok) return;

    await submitWithVerification('remove', {
      rowNumber: item.rowNumber
    }, `${item.symbol} deleted`);
  }

  async function init(){
    buildShell();
    setSync('reading','Reading sheet');
    const restored = restoreLocal();
    if (restored) renderAll();
    const ok = await refreshFromSheet(false);
    if (!ok && !restored) {
      loadSample();
      renderAll();
      setSync('error','Sample mode');
    }
    if (!ok && restored) {
      setSync('error','Using cache');
    }
  }

  window.addEventListener('keydown', e => {
    if (e.key === 'Escape' && S.panel) closePanel();
  });

  init();
})();
</script>
